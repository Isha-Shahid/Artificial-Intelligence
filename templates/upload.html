<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Diagnosis Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #89f7fe, #66a6ff);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #fff;
            padding: 40px 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 600px;
        }
        h1 {
            margin-bottom: 20px;
            color: #333;
        }
        input[type="file"] {
            margin: 20px 0;
            padding: 10px;
            font-size: 16px;
        }
        button {
            background-color: #66a6ff;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #558de8;
        }
        img {
            margin-top: 20px;
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
            cursor: pointer;
        }
        .prediction {
            margin-top: 20px;
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }
        .suggestion {
            margin-top: 20px;
            font-size: 18px;
            color: #555;
            font-weight: 400;
        }
        .error-message {
            color: red;
            font-weight: bold;
            margin-top: 20px;
        }
        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgb(0,0,0);
            background-color: rgba(0,0,0,0.4);
            padding-top: 60px;
        }
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 600px;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }
        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Welcome, {{ username }}!</h1>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept=".jpg, .jpeg, .png,image/jpeg,image/png" required>
        <br>
        <button type="submit">Click to Diagnose</button>
    </form>

    {% if error_message %}
        <div class="error-message">
            {{ error_message }}
        </div>
    {% endif %}

    {% if prediction %}
        <div class="prediction">
            Predicted Result: <strong>{{ prediction }}</strong>
        </div>

        <div class="suggestion">
            <strong>Suggested Actions:</strong> {{ suggestion }}
        </div>
    {% endif %}

    {% if img_path %}
        <img src="{{ img_path }}" alt="Uploaded Leaf Image" onclick="openModal('{{ prediction }}')">
    {% endif %}
</div>

<!-- Modal for Disease History -->
<div id="historyModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2> Disease History </h2>
        <p id="historyText"></p>
    </div>
</div>

<script>
    function openModal(prediction) {
        // Full three-line disease histories
        var diseaseHistory = {
            'Bacterial_Leaf_Blight':
                "First described in the late 19th century, Bacterial Leaf Blight is caused by the bacterium Xanthomonas oryzae pv. oryzae.\n" +
                "It quickly spread through irrigation systems in humid rice-growing regions, leading to devastating yield losses.\n" +
                "Modern management relies on resistant rice varieties and integrated practices like balanced fertilization and clean water supply.",

            'Brown_Spot':
                "Brown Spot, caused by the fungus Cochliobolus miyabeanus, was first reported in the 1920s in Asia’s paddy fields.\n" +
                "It thrives under high humidity and phosphorus-deficient soils, producing brown lesions that reduce grain quality.\n" +
                "Today, crop rotation, proper nutrient management, and fungicide applications are key to controlling its spread.",

            'Leaf_Smut':
                "Leaf Smut, attributed to the fungus Entyloma oryzae, has been recorded in rice since the early 1900s.\n" +
                "It manifests as small black sori on the leaf surface, often overlooked until late in the season.\n" +
                "Effective management includes using certified disease-free seed, timely fungicide sprays, and removal of infected debris."
        };

        // Display the disease history in the modal
        document.getElementById("historyText").innerText = diseaseHistory[prediction] || 'No history available.';
        document.getElementById("historyModal").style.display = "block";
    }

    function closeModal() {
        document.getElementById("historyModal").style.display = "none";
    }
</script>


</body>
</html>
